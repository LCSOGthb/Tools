version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:current
    working_directory: ~/Tools
    steps:
      - checkout
      - run:
          name: "Build step"
          command: echo "Building project..."

  deploy:
    docker:
      - image: cimg/base:current
    working_directory: ~/Tools
    steps:
      - checkout
      - run:
          name: "Deploy step"
          command: echo "Deploying project..."

workflows:
  build-and-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
